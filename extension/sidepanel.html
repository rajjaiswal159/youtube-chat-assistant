<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AI Assistant</title>

    <link rel="stylesheet" href="sidepanel.css">
</head>

<body>

    <div class="container">

        <header>
            <h2>🤖 YouTube AI Assistant</h2>
            <p>Chat with any YouTube video using AI</p>
        </header>

        <button id="processBtn" class="primary-btn">
            📹 Process Video
        </button>

        <div class="chat-section">

            <div id="result" class="chat-box">
                <div class="welcome-message">
                    Welcome! 👋<br><br>
                    Click <b>Process Video</b> to load the transcript, then ask any question about the video.
                </div>
            </div>

            <textarea
                id="question"
                rows="3"
                placeholder="Ask anything about this video..."
            ></textarea>

            <button id="sendBtn" class="primary-btn">
                Send
            </button>

        </div>

    </div>

    <script src="sidepanel.js"></script>

</body>

</html>
